# /etc/nginx/sites-available/twilight
# Twilight Nginx 反向代理 + 请求限流配置
#
# 安装步骤：
#   1. sudo cp deploy/nginx-twilight.conf /etc/nginx/sites-available/twilight
#   2. sudo ln -s /etc/nginx/sites-available/twilight /etc/nginx/sites-enabled/
#   3. sudo nginx -t && sudo systemctl reload nginx
#
# 注意：需要在 /etc/nginx/nginx.conf 的 http {} 块中添加 limit_req_zone 定义，
# 或者直接把下面的 limit_req_zone 行放到 http {} 块里。

# ==================== 限流区域定义 ====================
# 放在 http {} 块中（/etc/nginx/nginx.conf 或 /etc/nginx/conf.d/rate-limit.conf）
#
# 注册接口：每 IP 每分钟 6 次（突发允许 3 次排队）
# limit_req_zone $binary_remote_addr zone=register:10m rate=6r/m;
#
# 登录接口：每 IP 每秒 2 次（突发允许 5 次排队）
# limit_req_zone $binary_remote_addr zone=login:10m rate=2r/s;
#
# 通用 API：每 IP 每秒 30 次（突发允许 50 次排队）
# limit_req_zone $binary_remote_addr zone=api_general:20m rate=30r/s;
#
# 全局连接数限制：每 IP 最多 50 个并发连接
# limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

server {
    listen 80;
    server_name your-domain.com;

    # 强制 HTTPS 跳转（生产环境必须启用）
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # SSL 证书（使用 certbot 或自签）
    ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 安全响应头
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # 全局连接数限制
    limit_conn conn_per_ip 50;

    # 请求体大小限制（与 Flask MAX_CONTENT_LENGTH 对齐）
    client_max_body_size 5m;

    # 超时设置
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # ==================== 注册接口限流（最严格） ====================
    location /api/v1/users/register {
        limit_req zone=register burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==================== 登录接口限流 ====================
    location /api/v1/auth/login {
        limit_req zone=login burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==================== Emby 注册队列（中等限流） ====================
    location /api/v1/users/me/emby/register {
        limit_req zone=login burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==================== 通用 API ====================
    location /api/ {
        limit_req zone=api_general burst=50 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==================== 前端静态文件 ====================
    location / {
        root /opt/twilight/webui/dist;
        try_files $uri $uri/ /index.html;

        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        return 404;
    }

    # 自定义 429 错误页面
    error_page 429 = @rate_limited;
    location @rate_limited {
        default_type application/json;
        return 429 '{"success":false,"message":"请求过于频繁，请稍后重试","data":null}';
    }
}
