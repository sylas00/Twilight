# /etc/nginx/conf.d/rate-limit.conf
# Twilight 限流区域定义
#
# 此文件需要放在 nginx.conf 的 http {} 块中被 include，
# 或者直接把这些 limit_req_zone 行复制到 /etc/nginx/nginx.conf 的 http {} 块里。

# 注册接口：每 IP 每分钟 6 次请求
limit_req_zone $binary_remote_addr zone=register:10m rate=6r/m;

# 登录接口：每 IP 每秒 2 次请求
limit_req_zone $binary_remote_addr zone=login:10m rate=2r/s;

# 通用 API：每 IP 每秒 30 次请求
limit_req_zone $binary_remote_addr zone=api_general:20m rate=30r/s;

# 全局连接数限制：每 IP 最多 50 个并发连接
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;
