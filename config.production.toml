# ===================================================================
# Twilight 生产环境配置模板
# 复制此文件为 config.toml 并根据实际情况修改
# 优先级: 环境变量 > config.toml > 程序默认值
# 环境变量格式: TWILIGHT_{SECTION}_{KEY}，如 TWILIGHT_GLOBAL_SERVER_NAME
# ===================================================================

[Global]
# 服务器名称，显示在前端页面标题
server_name = "Twilight"
# 服务器图标 URL（可选，留空使用默认图标）
server_icon = ""
# 是否开启日志输出
logging = true
# 日志等级 (10=DEBUG, 20=INFO, 30=WARNING, 40=ERROR)
log_level = 20
# 是否打印 SQLAlchemy ORM 日志（调试时开启）
sqlalchemy_log = false
# HTTP 请求失败时最大重试次数
max_retry = 3
# 数据库文件存放目录（相对于项目根目录）
databases_dir = "db"

# Redis 连接地址（可选，用于缓存、分布式锁、Token 等）
# 留空则使用内存实现，程序重启后缓存失效
# 格式示例：redis://[:password@]host:port/db
redis_url = ""

# Bangumi 相关配置
# Bangumi 个人令牌（从 https://bgm.tv/dev/app 获取）
bangumi_token = ""
# 是否启用全局 Bangumi 同步功能
global_bgm_mode = false
# Bangumi API 地址
bangumi_api_url = "https://api.bgm.tv"
# Bangumi App ID（可选）
bangumi_app_id = ""

# Telegram 相关配置
# 是否启用 Telegram Bot 模式
telegram_mode = false
# 是否强制绑定 Telegram（开启后注册时必须提供 telegram_id）
force_bind_telegram = false

# 邮箱绑定相关配置
# 是否启用邮箱绑定功能
email_bind = false
# 是否强制绑定邮箱
force_bind_email = false

# TMDB 相关配置
# TMDB API Key v3（从 https://www.themoviedb.org/settings/api 获取）
tmdb_api_key = ""
# TMDB API 地址（可替换国内镜像）
tmdb_api_url = "https://api.themoviedb.org/3"
# TMDB 图片 CDN 地址
tmdb_image_url = "https://image.tmdb.org/t/p"

# ===================================================================
[Emby]
# ===================================================================
# Emby/Jellyfin 服务器地址（后端用于连接）
# Docker 部署时请按实际网络环境配置地址
emby_url = "http://127.0.0.1:8096/"
# Emby API Token（管理面板 → 高级 → API 密钥）
emby_token = ""
# 管理员用户名（API Token 不可用时备用）
emby_username = ""
# 管理员密码（API Token 不可用时备用）
emby_password = ""
# 前端展示的 Emby 访问线路列表，格式为 "名称 : 地址"
emby_url_list = [
  "直连 : http://your-server:8096/",
]
# 白名单用户专用线路列表
emby_url_list_for_whitelist = [
  "直连 : http://your-server:8096/",
]

# ===================================================================
[Telegram]
# ===================================================================
# Telegram Bot API 基础地址
telegram_api_url = "https://api.telegram.org/bot"
# Bot Token
bot_token = ""
# 管理员 Telegram ID 列表
admin_id = []
# 群组 ID 或 @用户名 列表
group_id = []
# 频道 ID 或 @用户名 列表
channel_id = []
# 是否要求用户加入群组/频道后才能使用系统
force_subscribe = false
# 是否启用 TG Bot 面板功能
enable_tg_panel = false
# Telegram 代理地址（可选）
proxy_url = ""

# ===================================================================
[SAR]
# ===================================================================
# 是否允许注册
register_mode = true
# 是否仅允许使用注册码注册
register_code_limit = false
# 最大注册用户数量，-1 表示不限制
user_limit = 200

# ---- 无码注册（待激活） ----
# 是否允许无码注册
allow_pending_register = true
# 是否允许无 Emby 账户用户查看部分内容
allow_no_emby_view = true

# ---- Emby 自由注册 ----
# 是否开启 Emby 自由注册
emby_direct_register_enabled = false
# Emby 自由注册默认开通天数
emby_direct_register_days = 30
# Emby 自由注册队列 worker 数
emby_direct_register_workers = 8
# Emby 自由注册队列最大排队数
emby_direct_register_max_queue = 1000
# 注册完成状态保留时长（秒）
emby_direct_register_status_ttl = 1800

# ---- 管理员 / 白名单 ----
admin_uids = "1"
admin_usernames = ""
white_list_uids = ""
white_list_usernames = ""

# ---- 邀请系统 ----
invite_enabled = false
invite_limit = 10

# ---- 无 Emby 账户用户清理 ----
auto_cleanup_no_emby = false
auto_cleanup_no_emby_days = 7

# ===================================================================
[DeviceLimit]
# ===================================================================
# 是否启用设备限制
device_limit_enabled = false
# 单用户最大允许设备数
max_devices = 5
# 单用户最大同时播放流数
max_streams = 2
# 超出限制时是否踢掉最早会话
kick_oldest_session = false

# ===================================================================
[API]
# ===================================================================
# 监听地址（0.0.0.0 = 所有网卡）
host = "0.0.0.0"
# 监听端口
port = 5000
# 调试模式（生产环境必须为 false）
debug = false
# JWT Token 过期时间（秒，默认 10 天）
token_expire = 864000
# API Key 长度
api_key_length = 32
# 是否启用 CORS 跨域
cors_enabled = true
# 允许的跨域来源（生产环境建议配置为前端域名白名单）
cors_origins = ["*"]
# 文件上传目录（相对于项目根目录或绝对路径）
# upload_folder = "uploads"
# 最大上传文件大小（字节，默认 5MB）
# max_upload_size = 5242880
# 会话 Cookie 配置
session_cookie_name = "twilight_session"
session_cookie_secure = true
session_cookie_samesite = "Strict"
session_cookie_domain = ""
session_cookie_path = "/"

# ===================================================================
[Security]
# ===================================================================
# 连续登录失败多少次后锁定
login_fail_threshold = 5
# 锁定时长（分钟）
lockout_minutes = 30
# 是否允许仅凭 telegram_id 直接登录（生产建议关闭）
telegram_direct_login_enabled = false
# 是否允许通过 API Key 直接换取完整会话 token（生产建议关闭）
apikey_direct_login_enabled = false
# Bot 调用内部接口密钥（必填，需使用高强度随机字符串）
bot_internal_secret = ""

# ===================================================================
[Scheduler]
# ===================================================================
# 时区
timezone = "Asia/Shanghai"
# 是否启用定时任务
enabled = true
# 过期用户清理时间（HH:MM）
expired_check_time = "03:00"
# 即将过期提醒时间
expiring_check_time = "09:00"
# 每日统计生成时间
daily_stats_time = "00:05"
# 会话清理间隔（小时）
session_cleanup_interval = 6
# Emby 用户同步间隔（小时）
emby_sync_interval = 6

# ===================================================================
[Notification]
# ===================================================================
# 是否启用通知服务
enabled = true
# 到期前几天发送提醒
expiry_remind_days = 3
# 新媒体入库是否通知
new_media_notify = false

# ===================================================================
[BangumiSync]
# ===================================================================
# 是否启用 Bangumi 同步（Emby 看完自动在 BGM 标记进度）
enabled = false
# 同步时自动添加到收藏（标记为"在看"）
auto_add_collection = true
# 观看记录设为私密
private_collection = true
# 屏蔽关键词（包含这些词的番剧不同步）
block_keywords = []
# 最低播放进度百分比（达到才算看完）
min_progress_percent = 80

# ===================================================================
[Signin]
# ===================================================================
# 是否启用签到与积分系统（仅装饰用途，不影响权限）
enabled = true
# 货币展示名（如 星币 / 金币 / 云币）
currency_name = "星币"
# 每日签到获得积分的随机范围
daily_min = 5
daily_max = 20
# 连签加成总开关：关闭后只发放每日奖励，连签天数仍记录但不再额外赠送积分
streak_bonus_enabled = true
# 连签加成：到达指定连签天数额外奖励对应积分（仅在 streak_bonus_enabled=true 时生效）
# 两个列表一一对应，长度需一致
streak_bonus_days = [3, 7, 14, 30]
streak_bonus_points = [10, 50, 100, 300]
# 漏签是否清零连签天数
reset_after_miss = true
